name: Verify
permissions: {}
on:
  pull_request:
    paths:
      - 'src/**'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum
      - name: Linting
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62
          working-directory: src