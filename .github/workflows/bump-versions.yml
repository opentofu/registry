name: Bump Provider and Module Versions

# Use global lock
#
# https://github.com/opentofu/registry/pull/272#discussion_r1511031778
concurrency:
  group: main

on:
  schedule:
    - cron: '0,15,30,45 * * * *'
  workflow_dispatch:

jobs:
  bump-versions:
    timeout-minutes: 10
    runs-on: ubuntu-latest

    environment:
      name: Production
    permissions:
      contents: write
      actions: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      matrix:
        prefix: ["0", "1", "2", "3", "4", "5", "6", "7", "a", "b", "c", "d", "e", "f", "g", "h", "i", "j", "k", "l", "m", "n", "o", "p", "q", "r", "s", "t", "u", "v", "w", "x", "y", "z"]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: './src/go.mod'
          cache-dependency-path: './src/go.sum'
      - name: Bump Versions
        run: ./.github/workflows/bump-versions.sh
        env:
          PREFIX: ${{ matrix.prefix }}
          ENVIRONMENT: Production

  trigger-deploy:
    needs: bump-versions
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Trigger Generate and Sync Recent Changes
        run: |
          for attempt in 1 2 3 4 5; do
            if gh workflow run generate-and-deploy-recent.yml; then
              exit 0
            fi
            echo "Attempt $attempt failed; retrying in $((attempt * 10))s" >&2
            sleep $((attempt * 10))
          done
          echo "Failed to dispatch generate-and-deploy-recent after 5 attempts" >&2
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ github.repository }}
